syntax = "proto3";

package awecloud.signaling;

option go_package = "github.com/open-beagle/awecloud-signaling-desktop/pkg/proto";

// DesktopService Desktop 管理服务
service DesktopService {
  // 首次登录 - Desktop 用 Client 凭证登录
  rpc Login(DesktopLoginRequest) returns (DesktopLoginResponse);

  // Logto 登录 - Desktop 通过 Server 中转进行 Logto 认证（流式）
  rpc LoginWithLogto(LogtoLoginRequest) returns (stream LogtoLoginResponse);

  // 认证 - Desktop 用设备凭证认证
  rpc Authenticate(DesktopAuthenticateRequest) returns (DesktopAuthenticateResponse);

  // 心跳 - 保持连接状态
  rpc Heartbeat(stream DesktopHeartbeatRequest) returns (stream DesktopHeartbeatResponse);

  // 获取已授权主机列表
  rpc GetAuthorizedHosts(GetAuthorizedHostsRequest) returns (GetAuthorizedHostsResponse);

  // 获取指定主机的服务列表
  rpc GetHostServices(GetHostServicesRequest) returns (GetHostServicesResponse);

  // 获取我的设备列表
  rpc GetMyDevices(GetMyDevicesRequest) returns (GetMyDevicesResponse);

  // 设备下线
  rpc OfflineDevice(OfflineDeviceRequest) returns (OfflineDeviceResponse);

  // 删除设备
  rpc DeleteDevice(DeleteDeviceRequest) returns (DeleteDeviceResponse);

  // 切换服务收藏状态
  rpc ToggleFavorite(ToggleFavoriteRequest) returns (ToggleFavoriteResponse);

  // 获取收藏的服务列表
  rpc GetFavoriteServices(GetFavoriteServicesRequest) returns (GetFavoriteServicesResponse);

  // 等待登录结果 - 通过 gRPC 双向流等待登录完成（新增）
  rpc WaitForLoginResult(stream WaitForLoginResultRequest) returns (stream WaitForLoginResultResponse);
}

// ============================================
// 公共消息定义
// ============================================

// DesktopSystemInfo 系统信息（Desktop 专用）
message DesktopSystemInfo {
  string os = 1; // 操作系统：linux / windows / darwin
  string os_version = 2; // 系统版本
  string arch = 3; // CPU 架构：amd64 / arm64
  string hostname = 4; // 主机名
  string cpu = 5; // CPU 型号
  int32 cpu_cores = 6; // CPU 核心数
  int32 memory_gb = 7; // 内存大小（GB）
}

// ============================================
// Desktop 首次登录
// ============================================

// DesktopLoginRequest Desktop 首次登录请求
message DesktopLoginRequest {
  string client_name = 1; // Client 用户名
  string client_secret = 2; // Client 认证密钥
  string device_name = 3; // 设备名称（主机名）
  string device_fingerprint = 4; // 设备指纹（硬件唯一标识）
  DesktopSystemInfo system_info = 5; // 系统信息
}

// DesktopLoginResponse Desktop 首次登录响应
message DesktopLoginResponse {
  bool success = 1; // 是否成功
  string message = 2; // 响应消息
  uint64 desktop_id = 3; // Desktop ID（Headscale Node ID）
  string secret = 4; // Desktop 专属密钥（仅首次返回）
  string auth_key = 5; // Tailscale PreAuthKey，用于隧道连接
  string server_url = 6; // Headscale 服务器地址
}

// ============================================
// Desktop 认证
// ============================================

// DesktopAuthenticateRequest Desktop 认证请求
message DesktopAuthenticateRequest {
  uint64 desktop_id = 1; // Desktop ID
  string secret = 2; // Desktop 专属密钥
  string device_fingerprint = 3; // 设备指纹（用于验证）
  DesktopSystemInfo system_info = 4; // 系统信息
}

// DesktopAuthenticateResponse Desktop 认证响应
message DesktopAuthenticateResponse {
  bool success = 1; // 是否成功
  string message = 2; // 响应消息
  string auth_key = 3; // Tailscale PreAuthKey（如需重新连接）
  string server_url = 4; // Headscale 服务器地址
}

// ============================================
// Desktop 心跳（双向流）
// ============================================

// DesktopHeartbeatRequest Desktop 心跳请求
message DesktopHeartbeatRequest {
  uint64 desktop_id = 1; // Desktop ID
  string tunnel_ip = 2; // 隧道 IP
  bool tunnel_connected = 3; // 隧道连接状态
}

// AuthorizedService 已授权服务
message AuthorizedService {
  string id = 1; // 服务 ID
  string name = 2; // 服务名称
  string agent_name = 3; // 所属 Agent 名称
  string listen_addr = 4; // 源地址（VPN 地址，如 100.64.0.1:3306）
  string target_addr = 5; // 目标地址（内网地址，如 192.168.1.10:3306）
}

// DesktopHeartbeatResponse Desktop 心跳响应
message DesktopHeartbeatResponse {
  repeated AuthorizedService authorized_services = 1; // 已授权服务列表
}

// ============================================
// 获取已授权主机列表
// ============================================

// GetAuthorizedHostsRequest 获取已授权主机列表请求
message GetAuthorizedHostsRequest {
  uint64 desktop_id = 1; // Desktop ID
}

// AuthorizedHost 已授权主机（SSH 授权）
message AuthorizedHost {
  string host_id = 1; // 主机ID（Agent用户ID）
  string host_name = 2; // 主机名称（Agent别名）
  string tunnel_ip = 3; // 隧道IP
  repeated string ssh_users = 4; // 允许的 SSH 用户名列表
  string status = 5; // 状态（online/offline）
  string last_seen = 6; // 最后在线时间
}

// GetAuthorizedHostsResponse 获取已授权主机列表响应
message GetAuthorizedHostsResponse {
  repeated AuthorizedHost hosts = 1; // 主机列表
}

// ============================================
// 获取指定主机的服务列表
// ============================================

// GetHostServicesRequest 获取指定主机的服务列表请求
message GetHostServicesRequest {
  uint64 desktop_id = 1; // Desktop ID
  string host_id = 2; // 主机ID
}

// GetHostServicesResponse 获取指定主机的服务列表响应
message GetHostServicesResponse {
  repeated AuthorizedService services = 1; // 服务列表
}

// ============================================
// 获取我的设备列表
// ============================================

// GetMyDevicesRequest 获取我的设备列表请求
message GetMyDevicesRequest {
  uint64 desktop_id = 1; // Desktop ID
}

// DeviceInfo 设备信息
message DeviceInfo {
  string device_token = 1; // 设备令牌
  string device_name = 2; // 设备名称
  string os = 3; // 操作系统
  string arch = 4; // 架构
  string hostname = 5; // 主机名
  string status = 6; // 状态（online/offline）
  string last_used_at = 7; // 最后使用时间
  string created_at = 8; // 创建时间
  bool is_current = 9; // 是否是当前设备
}

// GetMyDevicesResponse 获取我的设备列表响应
message GetMyDevicesResponse {
  repeated DeviceInfo devices = 1; // 设备列表
}

// ============================================
// 设备下线
// ============================================

// OfflineDeviceRequest 设备下线请求
message OfflineDeviceRequest {
  uint64 desktop_id = 1; // 当前 Desktop ID
  string device_token = 2; // 要下线的设备令牌
}

// OfflineDeviceResponse 设备下线响应
message OfflineDeviceResponse {
  bool success = 1; // 是否成功
  string message = 2; // 响应消息
}

// ============================================
// 删除设备
// ============================================

// DeleteDeviceRequest 删除设备请求
message DeleteDeviceRequest {
  uint64 desktop_id = 1; // 当前 Desktop ID
  string device_token = 2; // 要删除的设备令牌
}

// DeleteDeviceResponse 删除设备响应
message DeleteDeviceResponse {
  bool success = 1; // 是否成功
  string message = 2; // 响应消息
}

// ============================================
// 切换服务收藏状态
// ============================================

// ToggleFavoriteRequest 切换服务收藏状态请求
message ToggleFavoriteRequest {
  uint64 desktop_id = 1; // Desktop ID
  string service_id = 2; // 服务 ID
}

// ToggleFavoriteResponse 切换服务收藏状态响应
message ToggleFavoriteResponse {
  bool success = 1; // 是否成功
  string message = 2; // 响应消息
  bool is_favorite = 3; // 当前收藏状态
}

// ============================================
// 获取收藏的服务列表
// ============================================

// GetFavoriteServicesRequest 获取收藏的服务列表请求
message GetFavoriteServicesRequest {
  uint64 desktop_id = 1; // Desktop ID
}

// GetFavoriteServicesResponse 获取收藏的服务列表响应
message GetFavoriteServicesResponse {
  repeated string service_ids = 1; // 收藏的服务 ID 列表
}

// ============================================
// 等待登录结果（gRPC 双向流）
// ============================================

// WaitForLoginResultRequest 等待登录结果请求
message WaitForLoginResultRequest {
  string session_id = 1; // 登录会话 ID
  string device_fingerprint = 2; // 设备指纹
}

// WaitForLoginResultResponse 等待登录结果响应
message WaitForLoginResultResponse {
  WaitForLoginResultStatus status = 1; // 状态
  string message = 2; // 消息
  
  // 登录成功时返回
  uint64 desktop_id = 3; // Desktop ID
  string device_token = 4; // 设备令牌
  string auth_key = 5; // Tailscale PreAuthKey
  string server_url = 6; // Headscale 服务器地址
  string username = 7; // 用户名
}

// WaitForLoginResultStatus 等待登录结果状态
enum WaitForLoginResultStatus {
  WAIT_FOR_LOGIN_RESULT_STATUS_UNSPECIFIED = 0; // 未指定
  WAIT_FOR_LOGIN_RESULT_STATUS_PENDING = 1; // 等待中
  WAIT_FOR_LOGIN_RESULT_STATUS_SUCCESS = 2; // 登录成功
  WAIT_FOR_LOGIN_RESULT_STATUS_FAILED = 3; // 登录失败
  WAIT_FOR_LOGIN_RESULT_STATUS_TIMEOUT = 4; // 超时
  WAIT_FOR_LOGIN_RESULT_STATUS_CANCELLED = 5; // 已取消
}


// ============================================
// Logto 登录（流式）
// ============================================

// LogtoLoginRequest Logto 登录请求
message LogtoLoginRequest {
  string device_fingerprint = 1; // 设备指纹
  string device_name = 2; // 设备名称
  string username_hint = 3; // 用户名提示（可选，用于预填）
  DesktopSystemInfo system_info = 4; // 系统信息
}

// LogtoLoginResponse Logto 登录响应（流式）
// 第一条消息：返回 session_id 和 login_url
// 第二条消息：返回登录结果（成功时包含 token 和用户信息）
message LogtoLoginResponse {
  LogtoLoginStatus status = 1; // 状态
  string session_id = 2; // 会话 ID
  string login_url = 3; // 登录 URL（浏览器打开）
  string message = 4; // 消息
  // 登录成功后返回
  uint64 desktop_id = 5; // Desktop ID
  string secret = 6; // Desktop 专属密钥
  string auth_key = 7; // Tailscale PreAuthKey
  string server_url = 8; // Headscale 服务器地址
  LogtoUserInfo user_info = 9; // 用户信息
}

// LogtoLoginStatus Logto 登录状态
enum LogtoLoginStatus {
  LOGTO_LOGIN_STATUS_UNSPECIFIED = 0; // 未指定
  LOGTO_LOGIN_STATUS_PENDING = 1; // 待登录（返回 login_url）
  LOGTO_LOGIN_STATUS_SUCCESS = 2; // 登录成功
  LOGTO_LOGIN_STATUS_FAILED = 3; // 登录失败
  LOGTO_LOGIN_STATUS_EXPIRED = 4; // 会话过期
}

// LogtoUserInfo Logto 用户信息
message LogtoUserInfo {
  string user_id = 1; // 用户 ID（Logto sub）
  string username = 2; // 用户名
  string email = 3; // 邮箱
  string name = 4; // 显示名称
  string avatar = 5; // 头像 URL
}
