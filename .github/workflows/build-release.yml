name: Build and Release Desktop

on:
  push:
    branches:
      - main
  workflow_dispatch: # 允许手动触发

jobs:
  read-version:
    name: Read Version
    runs-on: ubuntu-latest
    outputs:
      BUILD_VERSION: ${{ steps.version.outputs.BUILD_VERSION }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Read version from file
        id: version
        run: echo "BUILD_VERSION=$(cat desktop/version | tr -d '\n\r' | sed 's/^v//')" >> $GITHUB_OUTPUT

  build-desktop:
    name: Build Desktop (Linux/Windows)
    runs-on: ubuntu-latest
    needs: read-version
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            nsis \
            unzip

      - name: Install Wails v3
        run: go install github.com/wailsapp/wails/v3/cmd/wails3@latest

      - name: Build Desktop Applications (Linux and Windows)
        run: |
          PLATFORMS=linux/amd64,windows/amd64 \
          BUILD_VERSION=${{ needs.read-version.outputs.BUILD_VERSION }} \
          BUILD_ADDRESS=${{ secrets.SIGNALING_ADDRESS }} \
          bash ./scripts/build.sh

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: desktop-all-platforms
          path: build/bin/*
          retention-days: 1

  build-desktop-mac:
    name: Build Desktop (macOS)
    runs-on: macos-latest
    needs: read-version
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Wails v3
        run: go install github.com/wailsapp/wails/v3/cmd/wails3@latest

      - name: Build Desktop Application (macOS)
        run: |
          PLATFORMS=darwin/arm64,darwin/amd64 \
          BUILD_VERSION=${{ needs.read-version.outputs.BUILD_VERSION }} \
          BUILD_ADDRESS=${{ secrets.SIGNALING_ADDRESS }} \
          bash ./scripts/build.sh

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: desktop-macos
          path: build/bin/*
          retention-days: 1

  upload-to-s3:
    name: Upload to S3
    runs-on: ubuntu-latest
    needs: [read-version, build-desktop, build-desktop-mac]
    steps:
      - name: Download Linux/Windows artifacts
        uses: actions/download-artifact@v4
        with:
          name: desktop-all-platforms
          path: artifacts

      - name: Download macOS artifacts
        uses: actions/download-artifact@v4
        with:
          name: desktop-macos
          path: artifacts

      - name: Setup MinIO Client
        run: |
          wget https://dl.min.io/client/mc/release/linux-amd64/mc
          chmod +x mc
          sudo mv mc /usr/local/bin/

      - name: Upload to S3
        run: |
          mc alias set aliyun --api=S3v4 ${{ secrets.S3_ENDPOINT_ALIYUN }} \
            ${{ secrets.S3_ACCESS_KEY_ALIYUN }} ${{ secrets.S3_SECRET_KEY_ALIYUN }}
          
          VERSION="${{ needs.read-version.outputs.BUILD_VERSION }}"
          S3_BUCKET="aliyun/vscode/awecloud-signaling"
          
          # 上传所有构建产物
          for file in artifacts/*; do
            if [ -f "$file" ]; then
              filename=$(basename "$file")
              echo "Uploading $filename..."
              mc cp "$file" "${S3_BUCKET}/$filename"
            fi
          done
          
          # 上传 latest 版本
          echo "Updating latest version..."
          if [ -n "$VERSION" ]; then
            for file in artifacts/*; do
              if [ -f "$file" ]; then
                filename=$(basename "$file")
                latest_filename=$(echo "$filename" | sed "s|$VERSION|latest|g")
                echo "Uploading $latest_filename..."
                mc cp "$file" "${S3_BUCKET}/$latest_filename"
              fi
            done
          else
            echo "Warning: VERSION is empty, skipping latest upload"
          fi
          
          # 创建 Desktop 版本信息文件
          cat > signal_desktop-version.json << EOF
          {
            "version": "$VERSION",
            "build_date": "$(date -u +%Y-%m-%dT%H:%M:%SZ)",
            "files": {
              "linux-amd64": "signal_desktop-$VERSION-linux-amd64",
              "windows-amd64": "signal_desktop-$VERSION-windows-amd64.exe",
              "darwin-amd64": "signal_desktop-$VERSION-darwin-amd64.zip",
              "darwin-arm64": "signal_desktop-$VERSION-darwin-arm64.zip"
            }
          }
          EOF
          mc cp signal_desktop-version.json "${S3_BUCKET}/signal_desktop-version.json"
          
          # 设置公开访问权限
          mc anonymous set download "${S3_BUCKET}/signal_desktop-version.json"
          for file in artifacts/*; do
            if [ -f "$file" ]; then
              filename=$(basename "$file")
              mc anonymous set download "${S3_BUCKET}/$filename"
              latest_filename=$(echo "$filename" | sed "s|$VERSION|latest|g")
              mc anonymous set download "${S3_BUCKET}/$latest_filename"
            fi
          done
          
          echo "Desktop ${VERSION} uploaded successfully!"
        env:
          S3_ACCESS_KEY_ALIYUN: ${{ secrets.S3_ACCESS_KEY_ALIYUN }}
          S3_SECRET_KEY_ALIYUN: ${{ secrets.S3_SECRET_KEY_ALIYUN }}
